<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Through the painting | il giuramento degli orazi</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link rel="preload" href="./public/00_scena_pre_prova.glb" as="fetch" crossorigin>
		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
				}
			}
		</script>
		<style>
			body {
				color: #222;
				margin: 0;
			}

			a {
				color: #2fa1d6;
			}

			p {
				max-width: 600px;
				margin-left: auto;
				margin-right: auto;
				padding: 0 2em;
			}

			/* ---------- LOADING SCREEN ---------- */

			#loading-screen {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				background-color: #0b0907;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				z-index: 9999;
				transition: opacity 0.8s ease;
			}

			#loading-screen.loading-screen--hidden {
				opacity: 0;
				pointer-events: none;
			}

			#loading-text {
				color: #f3e6d8;
				font-family: helvetica, Arial, sans-serif;
				font-size: 1.2rem;
				letter-spacing: 0.35em;
				text-transform: uppercase;
				margin-bottom: 1.6rem;
			}

			#loading-text::after {
				content: "";
				display: inline-block;
				width: 1.2em;
				text-align: left;
				animation: loading-dots 1.4s steps(4, end) infinite;
			}

			@keyframes loading-dots {
				0%   { content: ""; }
				25%  { content: "."; }
				50%  { content: ".."; }
				75%  { content: "..."; }
				100% { content: ""; }
			}

			#loading-bar-track {
				width: 280px;
				height: 2px;
				background-color: rgba(243, 230, 216, 0.15);
				position: relative;
				overflow: hidden;
			}

			#loading-bar-fill {
				position: absolute;
				top: 0;
				left: 0;
				height: 100%;
				width: 0%;
				background-color: #ffffff;
				box-shadow: 0 0 8px 1px rgba(227, 227, 227, 0.7);
				transition: width 0.25s ease-out;
			}

			#loading-percentage {
				margin-top: 0.9rem;
				color: rgba(243, 230, 216, 0.6);
				font-family: Helvetica, Arial, sans-serif;
				font-size: 0.85rem;
				letter-spacing: 0.15em;
			}
		</style>
	</head>

	<body>

		<div id="loading-screen">
			<div id="loading-text">Loading</div>
			<div id="loading-bar-track">
				<div id="loading-bar-fill"></div>
			</div>
			<div id="loading-percentage">0%</div>
		</div>

        <script type="module" src="./main.js"></script>
		
    </body>
    </html>
